name: K8s Manifest Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This will show the error but let the job continue
      - name: Run Kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:latest
        continue-on-error: true 
        with:
          args: "-summary -strict -verbose -output pretty ."

      # This will also run even if Kubeconform failed
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          scan-type: 'config'
          severity: 'HIGH,CRITICAL'
          scan-ref: '.'

      # Finally, fail the build if ANY of the above had issues
      # (Optional: remove continue-on-error from the last step to block the PR)
      - name: Run Kube-score
        run: |
          docker run --rm -v $(pwd):/project:Z zegl/kube-score:latest score /project/*.yaml
