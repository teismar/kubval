name: K8s Manifest Validation

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:latest
        continue-on-error: true
        with:
          args: "-summary -strict -verbose -output pretty demo.yaml demo2.yaml"

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.28.0 # Pinning to a stable version
        continue-on-error: true
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Run Kube-score
        run: |
          docker run --rm -v $(pwd):/project:Z zegl/kube-score:latest score /project/demo.yaml /project/demo2.yaml
